<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="/static/css/login.css">
</head>


<body>
    <section class="campo-login">
        <div class="frase-inicial">
            <h1>Bem-vindo(a)!</h1>
            <h4>Faça login para entrar na sua conta!</h4>
        </div>

        <form action="/logar" method="post">
            <div class="login">

                <p> E-mail:</p>
                <input id="usuario" name="usuario" type="text" placeholder="Digite seu e-mail...">

                <p>Senha:</p>
                <input id="senha" name="senha" type="password" placeholder="Digite sua senha..."><br>

                <div class="botao-div">
                    <button type="submit" class="botao">Entrar</button>
                </div>
            </div>
        </form>
    </section>
</body>

</html>
