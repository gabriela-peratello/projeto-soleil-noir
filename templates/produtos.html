<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title>Produtos</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="/static/css/produto.css">

    <!-- LINK BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <section class="todas-secoes">

        <!-- 1. BLOCO DE PRODUTOS (Corrigido para 'produto in produtos') -->
        {% for produto in produtos %}
        <section class="imagem-produto-esp">
            <div class="imagem-produto">
                <img src="{{ produto.foto }}" alt="Foto do produto">
            </div>
        </section>

        <section class="informacoes-produto">
            <div class="produto-desc">
                <h1>{{ produto.produto }}</h1>
                <p>{{ produto.descr }}</p>
                <div class="botao-comprar"> <button> Comprar</button> </div>
            </div>
        </section>
        {% endfor %}

        <!-- 2. FORMULÁRIO DE ENVIO DE COMENTÁRIO -->
        <section class="comentarios-produto">
           <form action="/comentarios/comentar" method="POST">
                <h2>Envie um comentário!</h2>
                <label>O que acha do produto?</label>
                <!-- Ajustado de input para textarea para ficar melhor visualmente -->
                <textarea name="comentario" placeholder="Escreva aqui seu comentário..."></textarea>
                <button type="submit">Enviar</button>
           </form>
        </section>

        <!-- 3. LISTA DE COMENTÁRIOS DA COMUNIDADE (Corrigido e fechado corretamente) -->
        <section class="comentario-container">
            <h2 class="comentario-title">Comentários da Comunidade</h2>
            
            {% for c in lista_comentarios %}
            <div class="comentario-card">
                <div class="comentario-topo">
                    <h3>@{{ c.nome_completo }}</h3>
                </div>
                <p>
                    {{ c.comentario }}
                </p>
            </div>
            {% endfor %}
        </section>

    </section>
</body>
</html>
